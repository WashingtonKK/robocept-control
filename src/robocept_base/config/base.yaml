# Differential-drive base controller configuration.
#
# IMPORTANT: Set wheel_radius and wheel_separation to match your robot's
# physical dimensions. The defaults (0.0) will cause the node to log an
# error and refuse to move.

/**:
  ros__parameters:
    # --- Robot physical parameters ---
    wheel_radius: 0.0            # meters — MUST SET for your robot
    wheel_separation: 0.0        # meters (center-to-center of left/right wheels) — MUST SET

    # --- Velocity limits ---
    max_linear_vel: 1.0          # m/s
    max_angular_vel: 2.0         # rad/s

    # --- Encoder ---
    encoder_ticks_per_rev: 0     # 0 = no encoders (open-loop mode)

    # --- Control loop ---
    control_rate_hz: 20.0        # Hz
    cmd_vel_timeout_sec: 0.5     # stop motors if no cmd_vel for this long

    # --- Hardware interface ---
    # Set device_port to your motor controller's serial/I2C path.
    # Examples: "/dev/ttyUSB0", "/dev/ttyAMA0", "/dev/i2c-1"
    device_port: ""
    device_baudrate: 115200

    # --- Odometry ---
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    publish_tf: true
